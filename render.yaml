services:
  - type: web
    name: autovulnscan
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: autovulnscan-db
          property: connectionString

databases:
  - name: autovulnscan-db
    plan: free
